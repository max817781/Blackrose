<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>閃避吧！黑玫瑰</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a2e;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        /* UI 介面層 */
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
        }

        .left-stats {
            display: flex;
            flex-direction: column;
        }

        #score-display, #combo-display, #hp-display, #coin-display {
            color: #fff;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
        }

        #score-display { font-size: 24px; }
        #coin-display { font-size: 18px; color: #ffd166; margin-top: 5px; }
        
        #combo-display {
            font-size: 18px;
            color: #ff4d6d;
            margin-top: 5px;
            transition: transform 0.1s;
        }

        #hp-display {
            font-size: 28px;
            letter-spacing: 2px;
        }

        /* Boss 警告文字 */
        #boss-warning {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px;
            font-weight: bold;
            color: #ff0000;
            text-shadow: 0 0 15px rgba(255,0,0,0.8), 2px 2px 0px #fff;
            text-align: center;
            opacity: 0;
            transition: opacity 0.5s;
        }

        #boss-warning.show {
            opacity: 1;
            animation: flashWarning 0.5s infinite alternate;
        }

        @keyframes flashWarning {
            from { transform: translate(-50%, -50%) scale(1); }
            to { transform: translate(-50%, -50%) scale(1.1); }
        }

        /* 選單與結束畫面 */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
            transition: opacity 0.3s ease;
            z-index: 10;
        }

        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .title {
            color: #ff4d6d;
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 77, 109, 0.5);
            text-align: center;
        }

        .menu-coins {
            color: #ffd166;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 0 0 5px rgba(255, 209, 102, 0.5);
        }

        .subtitle {
            color: #fff;
            font-size: 16px;
            margin-bottom: 30px;
            text-align: center;
            line-height: 1.5;
        }

        .btn {
            background: linear-gradient(135deg, #ff4d6d, #c9184a);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(201, 24, 74, 0.4);
            transition: transform 0.1s, box-shadow 0.1s;
            margin-bottom: 15px;
            width: 80%;
            max-width: 250px;
        }

        .btn:active {
            transform: scale(0.95);
            box-shadow: 0 2px 10px rgba(201, 24, 74, 0.4);
        }

        .btn-secondary {
            background: linear-gradient(135deg, #4d6dff, #184ac9);
            box-shadow: 0 4px 15px rgba(24, 74, 201, 0.4);
        }

        .btn-shop {
            background: linear-gradient(135deg, #ffd166, #ff9f1c);
            box-shadow: 0 4px 15px rgba(255, 159, 28, 0.4);
            color: #333;
            font-weight: bold;
        }

        #final-score {
            color: #ffd166;
            font-size: 28px;
            margin-bottom: 10px;
            font-weight: bold;
        }

        #earned-coins {
            color: #fff;
            font-size: 18px;
            margin-bottom: 20px;
        }

        /* 寶箱 3選1、圖鑑 與 商店 介面樣式 */
        #chest-screen .title, #gallery-screen .title, #shop-screen .title {
            color: #ffd166;
            text-shadow: 0 0 10px rgba(255, 209, 102, 0.5);
            margin-bottom: 20px;
            font-size: 30px;
        }

        .cards-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 90%;
            max-width: 400px;
        }

        .gallery-container {
            max-height: 60vh;
            overflow-y: auto;
            padding-right: 10px;
            margin-bottom: 20px;
        }

        .gallery-container::-webkit-scrollbar { width: 6px; }
        .gallery-container::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.1); border-radius: 3px; }
        .gallery-container::-webkit-scrollbar-thumb { background: #ffd166; border-radius: 3px; }

        .buff-card {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #ff4d6d;
            border-radius: 15px;
            padding: 15px;
            color: white;
            display: flex;
            align-items: center;
            cursor: pointer;
            backdrop-filter: blur(5px);
            transition: transform 0.2s, background 0.2s;
            flex-shrink: 0;
            position: relative;
        }

        .buff-card:active {
            transform: scale(0.95);
            background: rgba(255, 77, 109, 0.3);
        }

        .gallery-container .buff-card { cursor: default; }
        .gallery-container .buff-card:active { transform: none; background: rgba(255, 255, 255, 0.1); }

        .buff-icon { font-size: 40px; margin-right: 15px; flex-shrink: 0; }
        .buff-info { display: flex; flex-direction: column; flex-grow: 1; }
        .buff-name { font-size: 20px; font-weight: bold; color: #ffd166; margin-bottom: 5px; }
        .buff-desc { font-size: 14px; color: #ddd; line-height: 1.4; }
        
        .shop-price {
            background: #ff9f1c;
            color: #1a1a2e;
            padding: 4px 10px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 14px;
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
        }
        
        .shop-item-bought {
            border-color: #4d6dff;
            opacity: 0.7;
            cursor: default;
        }
        .shop-item-bought .shop-price {
            background: #4d6dff;
            color: #fff;
        }

    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="top-bar">
            <div class="left-stats">
                <div id="score-display">分數: 0</div>
                <div id="combo-display">Combo: 0 (x1.0)</div>
                <div id="coin-display">硬幣: 0</div>
            </div>
            <div class="right-stats">
                <div id="hp-display">❤️❤️❤️</div>
            </div>
        </div>
        <div id="boss-warning" class="hidden">⚠️ 狂粉出沒！撐住 15 秒！ ⚠️</div>
    </div>

    <div id="start-screen" class="overlay">
        <div class="title">閃避吧！黑玫瑰</div>
        <div class="menu-coins" id="menu-coins-text">粉絲硬幣: 0</div>
        <div class="subtitle">
            狂粉的情書💌從四面八方飛來了！<br>
            在螢幕上<b>點擊或拖曳</b>，黑玫瑰會自動跟隨。<br>
            💰SC(加分) 💣黑粉(追蹤10秒後爆炸) 👹Boss(狂粉)<br>
            （注意：碰到本體會扣血斷 Combo！）
        </div>
        <button class="btn" id="start-btn">開始遊戲</button>
        <button class="btn btn-shop" id="open-shop-btn">粉絲商店 (永久養成)</button>
        <button class="btn btn-secondary" id="gallery-btn">寶箱展示櫃</button>
    </div>

    <div id="shop-screen" class="overlay hidden">
        <div class="title">粉絲俱樂部升級</div>
        <div class="menu-coins" id="shop-coins-text">持有硬幣: 0</div>
        <div class="cards-container gallery-container" id="shop-cards-container">
            </div>
        <button class="btn" id="close-shop-btn">返回</button>
    </div>

    <div id="gallery-screen" class="overlay hidden">
        <div class="title">粉絲禮物圖鑑</div>
        <div class="cards-container gallery-container" id="gallery-cards-container">
            </div>
        <button class="btn" id="close-gallery-btn">返回</button>
    </div>

    <div id="game-over-screen" class="overlay hidden">
        <div class="title">被情書淹沒了...</div>
        <div id="final-score">最終分數: 0</div>
        <div id="earned-coins">獲得硬幣: +0</div>
        <button class="btn" id="restart-btn">返回主選單</button>
    </div>

    <div id="chest-screen" class="overlay hidden">
        <div class="title">獲得粉絲禮物！(3選1)</div>
        <div class="cards-container" id="buff-cards-container">
            </div>
    </div>

    <script>
        // 錯誤攔截機制
        window.addEventListener('error', function(event) {
            const errorDiv = document.createElement('div');
            errorDiv.style.position = 'absolute';
            errorDiv.style.top = '10px';
            errorDiv.style.left = '10px';
            errorDiv.style.backgroundColor = 'rgba(255, 255, 255, 0.9)';
            errorDiv.style.color = 'red';
            errorDiv.style.padding = '10px';
            errorDiv.style.zIndex = '9999';
            errorDiv.style.border = '2px solid red';
            errorDiv.innerHTML = '<strong>遊戲發生錯誤！</strong><br>' + event.message + '<br>行號: ' + event.lineno;
            document.body.appendChild(errorDiv);
        });

        // --- 存檔系統 (LocalStorage) ---
        let fansCoins = parseInt(localStorage.getItem('fansCoins') || '0');
        let unlockedUpgrades = JSON.parse(localStorage.getItem('unlockedUpgrades') || '{"hp":false, "shield":false, "chest":false}');

        function saveGame() {
            localStorage.setItem('fansCoins', fansCoins);
            localStorage.setItem('unlockedUpgrades', JSON.stringify(unlockedUpgrades));
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const playerImage = new Image();
        playerImage.src = 'blackrose.png';
        playerImage.onerror = () => { console.warn("找不到 blackrose.png，將使用預設圓形。"); };

        // --- 效能優化：預先渲染所有 Emoji 圖示 ---
        function createEmojiCanvas(emoji, size, fontOffset) {
            const c = document.createElement('canvas');
            c.width = size; c.height = size;
            const context = c.getContext('2d');
            context.font = `${size * 0.7}px Arial`;
            context.textAlign = 'center';
            context.textBaseline = 'middle';
            context.fillText(emoji, size/2, size/2 + (fontOffset||0));
            return c;
        }

        const letterCanvas = createEmojiCanvas('💌', 36);
        const giftCanvas = createEmojiCanvas('🎁', 40);
        const scCanvas = createEmojiCanvas('💰', 40); // Super Chat
        const bombCanvas = createEmojiCanvas('💣', 40); // 黑粉追蹤彈
        const bossCanvas = createEmojiCanvas('👹', 100); // Boss
        const bulletCanvas = createEmojiCanvas('🔴', 24); // Boss 彈幕

        // UI 元素綁定
        const scoreDisplay = document.getElementById('score-display');
        const comboDisplay = document.getElementById('combo-display');
        const hpDisplay = document.getElementById('hp-display');
        const coinDisplay = document.getElementById('coin-display');
        
        const startScreen = document.getElementById('start-screen');
        const menuCoinsText = document.getElementById('menu-coins-text');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreDisplay = document.getElementById('final-score');
        const earnedCoinsDisplay = document.getElementById('earned-coins');
        
        const chestScreen = document.getElementById('chest-screen');
        const buffCardsContainer = document.getElementById('buff-cards-container');
        
        const galleryScreen = document.getElementById('gallery-screen');
        const galleryCardsContainer = document.getElementById('gallery-cards-container');
        
        const shopScreen = document.getElementById('shop-screen');
        const shopCardsContainer = document.getElementById('shop-cards-container');
        const shopCoinsText = document.getElementById('shop-coins-text');
        
        const bossWarning = document.getElementById('boss-warning');

        // 按鈕
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const galleryBtn = document.getElementById('gallery-btn');
        const closeGalleryBtn = document.getElementById('close-gallery-btn');
        const openShopBtn = document.getElementById('open-shop-btn');
        const closeShopBtn = document.getElementById('close-shop-btn');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function updateMenuCoins() {
            menuCoinsText.innerText = `粉絲硬幣: ${fansCoins}`;
            shopCoinsText.innerText = `持有硬幣: ${fansCoins}`;
        }
        updateMenuCoins();

        // --- 10種道具圖鑑 ---
        const allBuffs = [
            { id: 'shield', icon: '🛡️', name: '鐵粉護盾', desc: '獲得一層護盾，可無損抵擋 1 次攻擊' },
            { id: 'clear', icon: '🧹', name: '全頻禁言', desc: '瞬間清除畫面上所有的敵方飛行物' },
            { id: 'slow', icon: '🐢', name: '網路延遲', desc: '所有敵人飛行速度減慢 50% (持續5秒)' },
            { id: 'small', icon: '👧', name: '蘿莉型態', desc: '黑玫瑰的受傷判定範圍縮小 50% (持續5秒)' },
            { id: 'score', icon: '🔥', name: 'SC狂潮', desc: '基礎分數獲取速度飆升 3 倍 (持續5秒)' },
            { id: 'invincible', icon: '🌟', name: '會員無敵', desc: '進入無敵狀態，無視任何傷害 (持續4秒)' },
            { id: 'aura', icon: '🌀', name: '反愛心力場', desc: '自動摧毀靠近身邊的情書與炸彈 (持續5秒)' },
            { id: 'shrink', icon: '🤏', name: '縮水魔法', desc: '將畫面上現有的敵人體積全部變小一半' },
            { id: 'money', icon: '💰', name: '抖內大禮包', desc: '瞬間獲得 500 分' },
            { id: 'heal', icon: '💖', name: '愛心便當', desc: '回復 1 點生命值' }
        ];

        // --- 商店升級項目 ---
        const shopItems = [
            { id: 'hp', icon: '💖', name: '鐵粉意志', desc: '永久增加 1 點最大生命值', price: 1500 },
            { id: 'shield', icon: '🛡️', name: '防禦結界', desc: '每局遊戲開始時自帶一層護盾', price: 800 },
            { id: 'chest', icon: '🎁', name: '人氣爆棚', desc: '寶箱掉落間隔縮短 20% (變為8秒)', price: 1000 }
        ];

        function initGallery() {
            galleryCardsContainer.innerHTML = '';
            allBuffs.forEach(buff => {
                const card = document.createElement('div');
                card.className = 'buff-card';
                card.innerHTML = `<div class="buff-icon">${buff.icon}</div>
                                  <div class="buff-info"><div class="buff-name">${buff.name}</div><div class="buff-desc">${buff.desc}</div></div>`;
                galleryCardsContainer.appendChild(card);
            });
        }
        initGallery();

        function renderShop() {
            shopCardsContainer.innerHTML = '';
            shopItems.forEach(item => {
                const isBought = unlockedUpgrades[item.id];
                const card = document.createElement('div');
                card.className = `buff-card ${isBought ? 'shop-item-bought' : ''}`;
                card.innerHTML = `
                    <div class="buff-icon">${item.icon}</div>
                    <div class="buff-info">
                        <div class="buff-name">${item.name}</div>
                        <div class="buff-desc">${item.desc}</div>
                    </div>
                    <div class="shop-price">${isBought ? '已擁有' : item.price + ' 🪙'}</div>
                `;
                
                if (!isBought) {
                    card.onclick = () => {
                        if (fansCoins >= item.price) {
                            fansCoins -= item.price;
                            unlockedUpgrades[item.id] = true;
                            saveGame();
                            updateMenuCoins();
                            renderShop(); // 重新渲染更新狀態
                        } else {
                            alert("粉絲硬幣不足喔！");
                        }
                    };
                }
                shopCardsContainer.appendChild(card);
            });
        }

        galleryBtn.addEventListener('click', () => { startScreen.classList.add('hidden'); galleryScreen.classList.remove('hidden'); });
        closeGalleryBtn.addEventListener('click', () => { galleryScreen.classList.add('hidden'); startScreen.classList.remove('hidden'); });
        openShopBtn.addEventListener('click', () => { renderShop(); startScreen.classList.add('hidden'); shopScreen.classList.remove('hidden'); });
        closeShopBtn.addEventListener('click', () => { shopScreen.classList.add('hidden'); startScreen.classList.remove('hidden'); });

        // --- 遊戲核心變數 ---
        let gameActive = false;
        let score = 0;
        let runCoins = 0; // 本局額外吃到的硬幣
        let animationId;
        let lastTime = 0;
        
        let MAX_HP = 3;
        let currentHp = MAX_HP;

        let comboCount = 0;
        let comboTimerAcc = 0;

        let letters = [];
        let explosions = []; // 儲存爆炸特效
        let letterSpawnTimer = 0;
        let letterSpawnInterval = 1000;
        const MAX_LETTERS = 300;

        let chests = [];
        let chestSpawnTimer = 0;
        let BASE_CHEST_INTERVAL = 10000;

        // Boss 戰變數
        let bossActive = false;
        let boss = null;
        let bossBullets = [];
        let nextBossScore = 1000;
        let bossDuration = 0; // Boss 存在時間

        let hasShield = false;
        let buffTimers = { slow: 0, small: 0, scoreBoost: 0, invincible: 0, aura: 0 };

        function updateHpDisplay() {
            let hpString = '';
            for(let i = 0; i < currentHp; i++) { hpString += '❤️'; }
            hpDisplay.innerText = hpString;
        }

        function takeDamage() {
            comboCount = 0;
            comboTimerAcc = 0;
            if (hasShield) {
                hasShield = false;
                buffTimers.invincible = 1500;
            } else {
                currentHp -= 1;
                updateHpDisplay();
                if (currentHp <= 0) gameOver();
                else buffTimers.invincible = 1500;
            }
        }

        // --- 玩家 (黑玫瑰) ---
        const player = {
            x: canvas.width / 2, y: canvas.height / 2, size: 40, baseHitboxRadius: 55, imgSize: 120, hitboxOffsetY: 0,
            get hitboxRadius() { return (buffTimers.small > 0) ? this.baseHitboxRadius * 0.5 : this.baseHitboxRadius; },
            draw: function(ctx) {
                ctx.save();
                if (buffTimers.invincible > 0 && Math.floor(Date.now() / 100) % 2 === 0) ctx.globalAlpha = 0.5;

                if (buffTimers.aura > 0) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y + this.hitboxOffsetY, 150, 0, Math.PI * 2);
                    ctx.fillStyle = 'rgba(255, 105, 180, 0.2)'; ctx.fill();
                    ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(255, 105, 180, 0.5)'; ctx.stroke();
                }

                const curImgSize = (buffTimers.small > 0) ? this.imgSize * 0.5 : this.imgSize;
                if (playerImage.complete && playerImage.naturalWidth !== 0) {
                    ctx.drawImage(playerImage, this.x - curImgSize/2, this.y - curImgSize/2 + this.hitboxOffsetY, curImgSize, curImgSize);
                } else {
                    ctx.fillStyle = '#ff4d6d'; ctx.beginPath(); ctx.arc(this.x, this.y, this.hitboxRadius, 0, Math.PI*2); ctx.fill();
                }

                if (hasShield) {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y + this.hitboxOffsetY, this.hitboxRadius + 10, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(255, 215, 0, 0.8)'; ctx.lineWidth = 4; ctx.stroke();
                }
                ctx.restore();
            }
        };

        class Chest {
            constructor() {
                this.radius = 20; this.x = Math.random()*(canvas.width-60)+30; this.y = -50; this.vy = 2;
            }
            update() { this.y += this.vy; }
            draw(ctx) {
                ctx.drawImage(giftCanvas, this.x - 20, this.y - 20);
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius + 5, 0, Math.PI * 2);
                ctx.strokeStyle = 'rgba(255, 209, 102, 0.5)'; ctx.lineWidth = 2; ctx.stroke();
            }
            isOffScreen() { return this.y > canvas.height + 50; }
        }

        // --- 新增：爆炸視覺特效類別 ---
        class Explosion {
            constructor(x, y, maxRadius) {
                this.x = x; this.y = y; this.maxRadius = maxRadius;
                this.currentRadius = 10; this.alpha = 1;
            }
            update(deltaTime) {
                this.currentRadius += deltaTime * 0.6; // 爆炸擴散速度
                this.alpha -= deltaTime * 0.003;       // 漸隱速度
            }
            draw(ctx) {
                ctx.save();
                ctx.globalAlpha = Math.max(0, this.alpha);
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.currentRadius, 0, Math.PI * 2);
                ctx.fillStyle = 'rgba(255, 69, 0, 0.3)'; // 橘紅色爆炸波
                ctx.fill();
                ctx.lineWidth = 4;
                ctx.strokeStyle = 'rgba(255, 69, 0, 0.8)';
                ctx.stroke();
                ctx.restore();
            }
            isDone() { return this.alpha <= 0; }
        }

        // --- 敵人與飛行物類別 ---
        class Enemy {
            constructor(type) {
                this.type = type; // 'normal', 'sc', 'bomb'
                this.scale = 1;
                this.markedForDeletion = false; // 標記是否準備被刪除
                
                const edge = Math.floor(Math.random() * 4);
                if (edge === 0) { this.x = Math.random() * canvas.width; this.y = -50; }
                else if (edge === 1) { this.x = canvas.width + 50; this.y = Math.random() * canvas.height; }
                else if (edge === 2) { this.x = Math.random() * canvas.width; this.y = canvas.height + 50; }
                else { this.x = -50; this.y = Math.random() * canvas.height; }

                this.targetX = player.x; this.targetY = player.y + player.hitboxOffsetY;
                this.angle = Math.atan2(this.targetY - this.y, this.targetX - this.x);
                this.angle += (Math.random() - 0.5) * 0.8; // 初始偏差

                let baseSpeed = 1.5 + Math.random() * 2 + (score / 500);

                if (type === 'normal') {
                    this.radius = 12; this.speed = baseSpeed;
                } else if (type === 'sc') {
                    this.radius = 15; this.speed = baseSpeed * 1.5; // SC飛超快
                } else if (type === 'bomb') {
                    this.radius = 15; this.speed = baseSpeed * 0.6; // 炸彈很慢
                    this.lifeTime = 10000; // 10秒爆炸倒數
                    this.isFlashing = false;
                    this.readyToExplode = false;
                }

                this.vx = Math.cos(this.angle) * this.speed;
                this.vy = Math.sin(this.angle) * this.speed;
                this.rotation = Math.random() * Math.PI * 2;
                this.rotationSpeed = (Math.random() - 0.5) * 0.1;
            }

            update(globalSpeedMult, deltaTime) {
                if (this.type === 'bomb') {
                    this.lifeTime -= deltaTime;
                    
                    // 最後 3 秒開始閃爍，且稍微變大警告玩家
                    if (this.lifeTime <= 3000) {
                        this.isFlashing = Math.floor(this.lifeTime / 200) % 2 === 0;
                        this.scale = 1 + ((3000 - this.lifeTime) / 3000) * 0.4; 
                    }
                    if (this.lifeTime <= 0) {
                        this.readyToExplode = true;
                    }

                    // 黑粉炸彈：追蹤邏輯 (緩慢修正角度)
                    const targetAngle = Math.atan2((player.y + player.hitboxOffsetY) - this.y, player.x - this.x);
                    let angleDiff = targetAngle - this.angle;
                    while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
                    while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
                    this.angle += angleDiff * 0.02; // 追蹤敏銳度
                    this.vx = Math.cos(this.angle) * this.speed;
                    this.vy = Math.sin(this.angle) * this.speed;
                }

                this.x += this.vx * globalSpeedMult;
                this.y += this.vy * globalSpeedMult;
                this.rotation += this.rotationSpeed;
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y);
                if (this.type !== 'sc') ctx.rotate(this.rotation); // SC 不旋轉，保持正的
                ctx.scale(this.scale, this.scale);
                
                if (this.type === 'normal') ctx.drawImage(letterCanvas, -18, -18);
                else if (this.type === 'sc') ctx.drawImage(scCanvas, -20, -20);
                else if (this.type === 'bomb') {
                    if (this.isFlashing) {
                        // 紅色警告光暈
                        ctx.beginPath();
                        ctx.arc(0, 0, 25, 0, Math.PI * 2);
                        ctx.fillStyle = 'rgba(255, 0, 0, 0.5)';
                        ctx.fill();
                    }
                    ctx.drawImage(bombCanvas, -20, -20);
                }
                
                ctx.restore();
            }

            isOffScreen() { return (this.x < -100 || this.x > canvas.width + 100 || this.y < -100 || this.y > canvas.height + 100); }
        }

        // --- Boss 類別 ---
        class Boss {
            constructor() {
                this.x = canvas.width / 2;
                this.y = -100; // 從上方進場
                this.targetY = 100;
                this.radius = 50;
                this.angle = 0; // 攻擊旋轉角
                this.moveTimer = 0;
                this.attackTimer = 0;
            }
            update(deltaTime) {
                // 進場
                if (this.y < this.targetY) this.y += 2;
                
                // 左右漂浮
                this.moveTimer += deltaTime;
                this.x = (canvas.width / 2) + Math.sin(this.moveTimer * 0.002) * (canvas.width / 3);

                // 發射彈幕 (螺旋)
                this.attackTimer += deltaTime;
                if (this.attackTimer > 150) { // 每 150ms 發射一顆
                    this.attackTimer = 0;
                    this.angle += 0.3; // 螺旋角度增加
                    bossBullets.push(new BossBullet(this.x, this.y, this.angle));
                    // 雙螺旋
                    bossBullets.push(new BossBullet(this.x, this.y, this.angle + Math.PI));
                }
            }
            draw(ctx) {
                ctx.drawImage(bossCanvas, this.x - 50, this.y - 50);
            }
        }

        class BossBullet {
            constructor(x, y, angle) {
                this.x = x; this.y = y; this.radius = 10;
                this.speed = 3;
                this.vx = Math.cos(angle) * this.speed;
                this.vy = Math.sin(angle) * this.speed;
            }
            update(globalSpeedMult) {
                this.x += this.vx * globalSpeedMult;
                this.y += this.vy * globalSpeedMult;
            }
            draw(ctx) {
                ctx.drawImage(bulletCanvas, this.x - 12, this.y - 12);
            }
            isOffScreen() { return (this.x < -50 || this.x > canvas.width + 50 || this.y < -50 || this.y > canvas.height + 50); }
        }

        // --- 全新觸控與滑鼠操作邏輯 (平滑跟隨) ---
        let targetX = canvas.width / 2;
        let targetY = canvas.height / 2 + 100;
        let isTouching = false;

        function handleInputStart(clientX, clientY) {
            if (!gameActive) return;
            isTouching = true;
            targetX = clientX;
            // 加上 -60 偏移量，讓角色停在手指/鼠標正上方一點點，避免遮擋視線
            targetY = clientY - 60; 
        }

        function handleInputMove(clientX, clientY) {
            if (!gameActive || !isTouching) return;
            targetX = clientX;
            targetY = clientY - 60;
        }

        function handleInputEnd() {
            isTouching = false;
        }
        
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); handleInputStart(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleInputMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
        canvas.addEventListener('touchend', handleInputEnd); canvas.addEventListener('touchcancel', handleInputEnd);
        canvas.addEventListener('mousedown', (e) => handleInputStart(e.clientX, e.clientY));
        window.addEventListener('mousemove', (e) => handleInputMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', handleInputEnd);

        // --- 寶箱與道具邏輯 ---
        function openChest() {
            gameActive = false; isTouching = false; // 暫停拖曳狀態
            const shuffledBuffs = [...allBuffs].sort(() => 0.5 - Math.random());
            const selectedBuffs = shuffledBuffs.slice(0, 3);
            buffCardsContainer.innerHTML = '';
            selectedBuffs.forEach(buff => {
                const card = document.createElement('div'); card.className = 'buff-card';
                card.innerHTML = `<div class="buff-icon">${buff.icon}</div><div class="buff-info"><div class="buff-name">${buff.name}</div><div class="buff-desc">${buff.desc}</div></div>`;
                card.onclick = () => applyBuff(buff.id);
                buffCardsContainer.appendChild(card);
            });
            chestScreen.classList.remove('hidden');
        }

        function applyBuff(buffId) {
            chestScreen.classList.add('hidden');
            switch(buffId) {
                case 'shield': hasShield = true; break;
                case 'clear': letters = []; bossBullets = []; break;
                case 'slow': buffTimers.slow = 5000; break;
                case 'small': buffTimers.small = 5000; break;
                case 'score': buffTimers.scoreBoost = 5000; break;
                case 'invincible': buffTimers.invincible = 4000; break;
                case 'aura': buffTimers.aura = 5000; break;
                case 'shrink': letters.forEach(l => { l.radius = 6; l.scale = 0.5; }); break;
                case 'money': score += 500; break;
                case 'heal': currentHp = Math.min(MAX_HP, currentHp + 1); updateHpDisplay(); break;
            }
            
            // 恢復遊戲時將座標重置為角色當前位置，避免瞬間暴衝
            targetX = player.x; 
            targetY = player.y;
            lastTime = performance.now(); gameActive = true; requestAnimationFrame(update);
        }

        // --- 核心迴圈 ---
        function update(timestamp) {
            if (!gameActive) return;
            const deltaTime = timestamp - lastTime;
            lastTime = timestamp;

            // --- 執行角色平滑跟隨 (Lerp) ---
            if (isTouching) {
                player.x += (targetX - player.x) * 0.15; // 0.15 是跟隨的敏銳度，數字越大跟越緊
                player.y += (targetY - player.y) * 0.15;
                
                // 確保角色不會跑出畫面外
                player.x = Math.max(player.size, Math.min(canvas.width - player.size, player.x));
                player.y = Math.max(player.size, Math.min(canvas.height - player.size - 40, player.y));
            }

            // Buff 時間扣除
            for(let key in buffTimers) { if(buffTimers[key] > 0) buffTimers[key] -= deltaTime; }

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Combo 計算
            comboTimerAcc += deltaTime;
            if (comboTimerAcc >= 1000) {
                comboCount++; comboTimerAcc -= 1000;
                comboDisplay.style.transform = 'scale(1.2)'; setTimeout(() => comboDisplay.style.transform = 'scale(1)', 100);
            }
            const comboMultiplier = 1 + (comboCount * 0.02);
            comboDisplay.innerText = `Combo: ${comboCount} (x${comboMultiplier.toFixed(2)})`;

            // 分數計算
            const baseScoreMult = (buffTimers.scoreBoost > 0) ? 3 : 1;
            score += deltaTime * 0.01 * baseScoreMult * comboMultiplier;
            scoreDisplay.innerText = `分數: ${Math.floor(score)}`;
            coinDisplay.innerText = `局內硬幣: ${runCoins}`;

            // --- Boss 觸發與邏輯 ---
            if (!bossActive && score >= nextBossScore) {
                bossActive = true;
                boss = new Boss();
                bossDuration = 15000; // 撐 15 秒
                bossWarning.classList.add('show');
                setTimeout(() => bossWarning.classList.remove('show'), 3000); // 警告顯示 3 秒
            }

            if (bossActive) {
                boss.update(deltaTime);
                boss.draw(ctx);
                bossDuration -= deltaTime;
                
                // Boss 結束判定
                if (bossDuration <= 0) {
                    bossActive = false;
                    boss = null;
                    bossBullets = [];
                    nextBossScore += 2000; // 下次 Boss 門檻提高
                    // Boss 獎勵：掉落 3 個寶箱
                    for(let i=0; i<3; i++) {
                        let c = new Chest();
                        c.x = canvas.width/2 - 60 + i*60; // 並排掉落
                        chests.push(c);
                    }
                    score += 1000; // 擊退分數
                }
            }

            // --- 寶箱邏輯 ---
            chestSpawnTimer += deltaTime;
            if (chestSpawnTimer >= BASE_CHEST_INTERVAL) {
                chests.push(new Chest()); chestSpawnTimer = 0;
            }

            for (let i = chests.length - 1; i >= 0; i--) {
                let chest = chests[i];
                chest.update(); chest.draw(ctx);
                const dist = Math.hypot(chest.x - player.x, chest.y - (player.y + player.hitboxOffsetY));
                if (dist < chest.radius + player.hitboxRadius) {
                    chests.splice(i, 1); openChest(); return; 
                }
                if (chest.isOffScreen()) chests.splice(i, 1);
            }

            const globalSpeedMult = (buffTimers.slow > 0) ? 0.5 : 1;

            // --- 一般敵人邏輯 (Boss戰時產出減慢) ---
            letterSpawnTimer += deltaTime;
            const currentInterval = Math.max(200, letterSpawnInterval - score * 2) * (bossActive ? 3 : 1); 
            
            if (letterSpawnTimer >= currentInterval && letters.length < MAX_LETTERS) {
                // 機率生成：5% SC, 10% 黑粉炸彈, 85% 正常
                const rand = Math.random();
                let type = 'normal';
                if (rand < 0.05) type = 'sc';
                else if (rand < 0.15) type = 'bomb';
                letters.push(new Enemy(type));
                letterSpawnTimer = 0;
            }

            for (let i = letters.length - 1; i >= 0; i--) {
                let letter = letters[i];
                
                // 如果已經被標記為刪除(例如被其他炸彈波及)，則安全移除並跳過
                if (letter.markedForDeletion) {
                    letters.splice(i, 1);
                    continue;
                }

                letter.update(globalSpeedMult, deltaTime);

                // --- 炸彈爆炸邏輯 ---
                if (letter.readyToExplode) {
                    // 產生爆炸視覺特效
                    explosions.push(new Explosion(letter.x, letter.y, 250));

                    // 炸毀半徑 250 內的敵人 (不炸SC)
                    for (let j = 0; j < letters.length; j++) {
                        if (i !== j && letters[j].type !== 'sc') {
                            const d = Math.hypot(letters[j].x - letter.x, letters[j].y - letter.y);
                            if (d <= 250) letters[j].markedForDeletion = true;
                        }
                    }

                    // 炸毀半徑 250 內的 Boss 彈幕
                    for (let j = bossBullets.length - 1; j >= 0; j--) {
                        const d = Math.hypot(bossBullets[j].x - letter.x, bossBullets[j].y - letter.y);
                        if (d <= 250) bossBullets.splice(j, 1);
                    }

                    // 檢查是否炸到玩家
                    const pDist = Math.hypot(player.x - letter.x, (player.y + player.hitboxOffsetY) - letter.y);
                    if (pDist <= 250 + player.hitboxRadius) {
                        if (buffTimers.invincible <= 0) takeDamage();
                    }

                    // 炸彈自我毀滅
                    letters.splice(i, 1);
                    continue; // 已經炸掉，跳過後面的碰撞判斷
                }

                letter.draw(ctx);

                const dist = Math.hypot(letter.x - player.x, letter.y - (player.y + player.hitboxOffsetY));
                
                if (buffTimers.aura > 0 && dist < 150 && letter.type !== 'sc') {
                    letter.markedForDeletion = true; continue; // 反愛心力場不摧毀 SC
                }

                if (dist < letter.radius + player.hitboxRadius) {
                    if (letter.type === 'sc') {
                        // 吃到 SC
                        score += 100;
                        runCoins += 10; // 額外獲得硬幣
                        letter.markedForDeletion = true;
                        // UI 回饋
                        coinDisplay.style.transform = 'scale(1.5)';
                        setTimeout(() => coinDisplay.style.transform = 'scale(1)', 150);
                    } else if (buffTimers.invincible > 0) {
                        // 無敵不扣血
                    } else {
                        takeDamage();
                        letter.markedForDeletion = true;
                    }
                } else if (letter.isOffScreen()) {
                    letter.markedForDeletion = true;
                }
            }

            // 清理這回合被標記刪除的敵人 (避免因索引改變造成的 Bug)
            for (let i = letters.length - 1; i >= 0; i--) {
                if (letters[i].markedForDeletion) letters.splice(i, 1);
            }

            // --- Boss 彈幕邏輯 ---
            for (let i = bossBullets.length - 1; i >= 0; i--) {
                let bullet = bossBullets[i];
                bullet.update(globalSpeedMult);
                bullet.draw(ctx);

                const dist = Math.hypot(bullet.x - player.x, bullet.y - (player.y + player.hitboxOffsetY));
                if (buffTimers.aura > 0 && dist < 150) { bossBullets.splice(i, 1); continue; }

                if (dist < bullet.radius + player.hitboxRadius) {
                    if (buffTimers.invincible <= 0) {
                        takeDamage();
                        bossBullets.splice(i, 1);
                    }
                } else if (bullet.isOffScreen()) {
                    bossBullets.splice(i, 1);
                }
            }

            // 繪製與更新爆炸特效
            for (let i = explosions.length - 1; i >= 0; i--) {
                let exp = explosions[i];
                exp.update(deltaTime);
                exp.draw(ctx);
                if (exp.isDone()) explosions.splice(i, 1);
            }

            player.draw(ctx);
            animationId = requestAnimationFrame(update);
        }

        // --- 流程控制 ---
        function startGame() {
            gameActive = true;
            score = 0; runCoins = 0;
            letters = []; chests = []; bossBullets = []; explosions = [];
            letterSpawnTimer = 0; chestSpawnTimer = 0;
            bossActive = false; boss = null; nextBossScore = 1000;
            
            // 讀取升級狀態
            MAX_HP = unlockedUpgrades.hp ? 4 : 3;
            currentHp = MAX_HP;
            updateHpDisplay();
            
            hasShield = unlockedUpgrades.shield;
            BASE_CHEST_INTERVAL = unlockedUpgrades.chest ? 8000 : 10000;

            comboCount = 0; comboTimerAcc = 0;
            for (let key in buffTimers) { buffTimers[key] = 0; }

            // 重置操作狀態
            player.x = canvas.width / 2; 
            player.y = canvas.height / 2 + 100;
            targetX = player.x;
            targetY = player.y;
            isTouching = false;

            lastTime = performance.now();

            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            chestScreen.classList.add('hidden');
            galleryScreen.classList.add('hidden');
            shopScreen.classList.add('hidden');
            
            animationId = requestAnimationFrame(update);
        }

        function gameOver() {
            gameActive = false;
            isTouching = false; // 遊戲結束時停止跟隨
            cancelAnimationFrame(animationId);
            
            // 結算硬幣：每 50 分 = 1 硬幣 + 遊戲內吃到 SC 的額外硬幣
            const calculatedCoins = Math.floor(score / 50) + runCoins;
            fansCoins += calculatedCoins;
            saveGame(); // 永久存檔
            updateMenuCoins();

            finalScoreDisplay.innerText = `最終分數: ${Math.floor(score)}`;
            earnedCoinsDisplay.innerText = `獲得硬幣: +${calculatedCoins} 🪙`;
            gameOverScreen.classList.remove('hidden');
            bossWarning.classList.remove('show');
        }

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', () => { gameOverScreen.classList.add('hidden'); startScreen.classList.remove('hidden'); });

        playerImage.onload = () => {
            if (!gameActive) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                player.draw(ctx);
            }
        };

        ctx.fillStyle = '#1a1a2e'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        player.x = canvas.width / 2; player.y = canvas.height / 2; player.draw(ctx);
        updateHpDisplay(); 

    </script>
</body>
